<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商途幻想 - UI替换编辑器（全界面）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100vh}
header#toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap;gap:6px}
header h1{font-size:15px;color:#e94560}
.toolbar-actions{display:flex;gap:6px;flex-wrap:wrap}
.toolbar-actions button{padding:5px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
#btn-export{background:#e94560;color:#fff}
#btn-export:hover{background:#c73652}
#btn-import{background:#0f3460;color:#4ade80;border:1px solid #4ade80}
#btn-import:hover{background:#1a4a8a}
#btn-reset{background:#333;color:#ccc;border:1px solid #555}
#btn-reset:hover{background:#444}
#main{display:flex;flex:1;overflow:hidden}
aside#sidebar{width:270px;background:#16213e;border-right:1px solid #0f3460;overflow-y:auto;flex-shrink:0;padding:10px}
aside#sidebar h2{font-size:11px;color:#888;margin:10px 0 6px;text-transform:uppercase;letter-spacing:1px}
aside#sidebar h2:first-child{margin-top:0}
aside#props-panel{width:260px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;flex-shrink:0;padding:12px}
aside#props-panel h2{font-size:11px;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.hint{color:#666;font-size:12px;font-style:italic}
#screen-select{width:100%;padding:6px 8px;background:#0f3460;border:1px solid #1a4a8a;border-radius:4px;color:#e0e0e0;font-size:12px;margin-bottom:8px;cursor:pointer}
#screen-select option{background:#0f3460;color:#e0e0e0}
.screen-stats{font-size:10px;color:#666;margin-bottom:6px;padding:3px 0;border-bottom:1px solid #0f3460}
.screen-stats .count-total{color:#e94560}
.screen-stats .count-done{color:#4ade80}
.group-header{font-size:11px;color:#e94560;padding:6px 4px 3px;margin-top:6px;border-top:1px solid #0f3460;font-weight:600;opacity:0.8}
.group-header:first-child{margin-top:0;border-top:none}
#btn-add-custom{width:100%;padding:7px;background:transparent;border:1px dashed #1a4a8a;border-radius:4px;color:#888;font-size:11px;cursor:pointer;margin-top:8px;transition:all .15s}
#btn-add-custom:hover{border-color:#e94560;color:#e94560}
#preview-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#111;overflow:auto;padding:20px}
#phone-frame{width:375px;height:720px;border:2px solid #333;border-radius:20px;overflow:hidden;position:relative;flex-shrink:0}
#preview{width:100%;height:100%;position:relative;overflow-y:auto;overflow-x:hidden}
.el-item{padding:6px 8px;margin-bottom:2px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:6px;transition:all .15s;border:1px solid transparent}
.el-item:hover{background:rgba(233,69,96,0.1);border-color:rgba(233,69,96,0.3)}
.el-item.active{background:rgba(233,69,96,0.2);border-color:#e94560}
.el-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.el-item .dot.empty{border:2px solid #555}
.el-item .dot.filled{background:#4ade80;border:2px solid #22c55e}
.el-item .el-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.el-item .el-upload{font-size:10px;color:#e94560;cursor:pointer;white-space:nowrap}
.el-item .el-delete{font-size:10px;color:#c73652;cursor:pointer;white-space:nowrap;margin-left:2px}
.preview-el{position:absolute;border:1px dashed rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s;overflow:hidden}
.preview-el:hover{border-color:rgba(233,69,96,0.5)}
.preview-el.selected{border-color:#e94560;box-shadow:0 0 0 1px #e94560}
.preview-el img{width:100%;height:100%;object-fit:fill}
.preview-el .placeholder{font-size:9px;color:rgba(255,255,255,0.3);text-align:center;padding:2px;pointer-events:none;word-break:break-all;line-height:1.2}
.prop-group{margin-bottom:12px}
.prop-group label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.prop-group input[type=number],.prop-group input[type=text],.prop-group select{width:100%;padding:4px 7px;background:#0f3460;border:1px solid #1a4a8a;border-radius:4px;color:#e0e0e0;font-size:12px}
.prop-group .upload-btn{display:block;width:100%;padding:7px;background:#0f3460;border:1px dashed #1a4a8a;border-radius:4px;color:#888;font-size:11px;text-align:center;cursor:pointer;transition:all .15s}
.prop-group .upload-btn:hover{border-color:#e94560;color:#e94560}
.prop-group .upload-btn.has-img{border-color:#4ade80;color:#4ade80}
.prop-row{display:flex;gap:6px}
.prop-row .prop-group{flex:1}
.prop-group .preview-thumb{width:100%;height:50px;object-fit:contain;border-radius:4px;margin-top:3px;background:rgba(0,0,0,0.3)}
#btn-remove-img{width:100%;padding:5px;background:#c73652;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:11px;margin-top:4px}
#btn-save{background:#4ade80;color:#111;border:none}
#btn-save:hover{background:#22c55e}
#btn-export-screen{background:#0f3460;color:#e94560;border:1px solid #e94560}
#btn-export-screen:hover{background:#1a4a8a}
.save-toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#4ade80;color:#111;padding:8px 24px;border-radius:6px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.save-toast.show{opacity:1}
.prop-group .zindex-row{display:flex;gap:4px;align-items:center}
.prop-group .zindex-row input{width:60px}
.prop-group .zindex-row span{font-size:10px;color:#666}
</style>
</head>
<body>
<div id="save-toast" class="save-toast">已保存</div>
<div id="app">
  <header id="toolbar">
    <h1>商途幻想 UI替换编辑器（全界面）</h1>
    <div class="toolbar-actions">
      <button id="btn-save" onclick="manualSave()">保存</button>
      <button id="btn-export" onclick="exportAll()">导出全部</button>
      <button id="btn-export-screen" onclick="exportCurrentScreen()">导出当前界面</button>
      <button id="btn-import" onclick="importConfig()">导入配置</button>
      <button id="btn-reset" onclick="resetAll()">重置全部</button>
    </div>
  </header>
  <div id="main">
    <aside id="sidebar">
      <h2>界面选择</h2>
      <select id="screen-select" onchange="switchScreen(this.value)"></select>
      <div class="screen-stats" id="screen-stats"></div>
      <h2>可替换元素</h2>
      <div id="element-list"></div>
      <button id="btn-add-custom" onclick="addCustomElement()">+ 添加自定义元素</button>
    </aside>
    <div id="preview-wrap">
      <div id="phone-frame">
        <div id="preview"></div>
      </div>
    </div>
    <aside id="props-panel">
      <h2>属性设置</h2>
      <div id="props-content">
        <p class="hint">点击左侧元素或预览区域中的元素进行编辑</p>
      </div>
    </aside>
  </div>
</div>

// Custom elements stored separately
let customElements = [];
let config = {};
let selectedId = null;
let currentScreen = 'main-menu';
let customIdCounter = 1;

function getAllElements() {
  return [...UI_ELEMENTS, ...customElements.filter(e => e.screen === currentScreen)];
}
function getAllElementsGlobal() {
  return [...UI_ELEMENTS, ...customElements];
}
function getScreenElements(screenId) {
  return [...UI_ELEMENTS.filter(el => el.screen === screenId), ...customElements.filter(el => el.screen === screenId)];
}

function init() {
  // Build screen selector first (sync)
  const sel = document.getElementById('screen-select');
  SCREENS.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });

  // Try loading from server, fallback to localStorage
  loadFromServer().then(serverData => {
    if (serverData && serverData.config) {
      config = serverData.config;
      if (serverData.customElements) {
        customElements = serverData.customElements;
        customIdCounter = customElements.reduce((max, e) => {
          const n = parseInt(e.id.replace('custom-',''));
          return n >= max ? n + 1 : max;
        }, 1);
      }
    } else {
      // Fallback to localStorage
      try {
        const saved = localStorage.getItem('ui_editor_config_v3');
        if (saved) config = JSON.parse(saved);
        const savedCustom = localStorage.getItem('ui_editor_custom_v3');
        if (savedCustom) {
          customElements = JSON.parse(savedCustom);
          customIdCounter = customElements.reduce((max, e) => {
            const n = parseInt(e.id.replace('custom-',''));
            return n >= max ? n + 1 : max;
          }, 1);
        }
      } catch(e) {}
    }
    renderSidebar();
    renderPreview();
    const firstEls = getScreenElements(currentScreen);
    if (firstEls.length > 0) selectElement(firstEls[0].id);
    updateScreenStats();
  });
}

function switchScreen(screenId) {
  currentScreen = screenId;
  selectedId = null;
  renderSidebar();
  renderPreview();
  const els = getScreenElements(screenId);
  if (els.length > 0) selectElement(els[0].id);
  else updateProps();
}

function updateScreenStats() {
  const els = getScreenElements(currentScreen);
  const done = els.filter(e => config[e.id] && config[e.id].dataUri).length;
  const total = els.length;
  const allEls = getAllElementsGlobal();
  const allDone = allEls.filter(e => config[e.id] && config[e.id].dataUri).length;
  const allTotal = allEls.length;
  document.getElementById('screen-stats').innerHTML =
    `当前: <span class="count-done">${done}</span>/<span class="count-total">${total}</span> | 全局: <span class="count-done">${allDone}</span>/<span class="count-total">${allTotal}</span>`;
  const sel = document.getElementById('screen-select');
  SCREENS.forEach((s, i) => {
    const sEls = getScreenElements(s.id);
    const sDone = sEls.filter(e => config[e.id] && config[e.id].dataUri).length;
    const sTotal = sEls.length;
    sel.options[i].textContent = s.name + (sDone > 0 ? ` (${sDone}/${sTotal})` : ` [${sTotal}]`);
  });
}

function renderSidebar() {
  const list = document.getElementById('element-list');
  list.innerHTML = '';
  const els = getScreenElements(currentScreen);
  let lastGroup = '';
  els.forEach(el => {
    if (el.g && el.g !== lastGroup) {
      lastGroup = el.g;
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.textContent = el.g;
      list.appendChild(gh);
    }
    const div = document.createElement('div');
    div.className = 'el-item' + (selectedId === el.id ? ' active' : '');
    const hasCfg = config[el.id] && config[el.id].dataUri;
    const isCustom = el.id.startsWith('custom-');
    div.innerHTML = `
      <span class="dot ${hasCfg ? 'filled' : 'empty'}"></span>
      <span class="el-name" title="${el.cssTarget}">${el.name}</span>
      <span class="el-upload" data-action="upload" data-id="${el.id}">上传</span>
      ${isCustom ? `<span class="el-delete" data-action="delete" data-id="${el.id}">删</span>` : ''}
    `;
    div.addEventListener('click', function(e) {
      const action = e.target.dataset?.action;
      const targetId = e.target.dataset?.id;
      if (action === 'upload' && targetId) { e.stopPropagation(); triggerUpload(targetId); return; }
      if (action === 'delete' && targetId) { e.stopPropagation(); deleteCustom(targetId); return; }
      selectElement(el.id);
    });
    list.appendChild(div);
  });
  updateScreenStats();
}

function renderPreview() {
  const preview = document.getElementById('preview');
  const screen = SCREENS.find(s => s.id === currentScreen);
  document.getElementById('phone-frame').style.background = screen ? screen.bg : '#3e2a16';
  preview.innerHTML = '';
  const els = getScreenElements(currentScreen);
  els.forEach(el => {
    const div = document.createElement('div');
    div.id = 'pv-' + el.id;
    div.className = 'preview-el' + (selectedId === el.id ? ' selected' : '');
    div.onclick = (e) => { e.stopPropagation(); selectElement(el.id); };
    const cfg = config[el.id] || {};
    const x = cfg.x ?? el.x, y = cfg.y ?? el.y, w = cfg.w ?? el.w, h = cfg.h ?? el.h;
    div.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${cfg.z || el.z || 'auto'}`;
    if (cfg.dataUri) {
      div.innerHTML = `<img src="${cfg.dataUri}" style="object-fit:${cfg.fit || el.fit || 'fill'}">`;
    } else {
      div.innerHTML = `<span class="placeholder">${el.name}</span>`;
    }
    makeDraggable(div, el.id);
    preview.appendChild(div);
  });
}

function makeDraggable(div, elId) {
  div.onmousedown = function(e) {
    const t = e.target;
    if (t.dataset?.action) return;
    if (t.classList.contains('el-upload') || t.classList.contains('el-delete')) return;
    e.preventDefault();
    selectElement(elId);
    const allEls = getAllElementsGlobal();
    const el = allEls.find(e => e.id === elId);
    const cfg = config[elId] || {};
    const origX = cfg.x ?? el.x, origY = cfg.y ?? el.y;
    const startX = e.clientX, startY = e.clientY;
    function onMove(e) {
      const newX = Math.round(origX + e.clientX - startX);
      const newY = Math.round(origY + e.clientY - startY);
      if (!config[elId]) config[elId] = {};
      config[elId].x = newX; config[elId].y = newY;
      div.style.left = newX + 'px'; div.style.top = newY + 'px';
      updateProps();
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveConfig();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}

function selectElement(id) {
  selectedId = id;
  renderSidebar();
  document.querySelectorAll('.preview-el').forEach(el => el.classList.remove('selected'));
  const pvEl = document.getElementById('pv-' + id);
  if (pvEl) { pvEl.classList.add('selected'); pvEl.scrollIntoView({block:'nearest'}); }
  updateProps();
}

function findElement(id) {
  return getAllElementsGlobal().find(e => e.id === id);
}

function updateProps() {
  const panel = document.getElementById('props-content');
  if (!selectedId) { panel.innerHTML = '<p class="hint">点击左侧或预览区元素进行编辑</p>'; return; }
  const el = findElement(selectedId);
  if (!el) { panel.innerHTML = '<p class="hint">未找到元素</p>'; return; }
  const cfg = config[selectedId] || {};
  const x = cfg.x ?? el.x, y = cfg.y ?? el.y, w = cfg.w ?? el.w, h = cfg.h ?? el.h;
  const fit = cfg.fit || el.fit || 'fill';
  const z = cfg.z || el.z || '';
  const hasImg = cfg.dataUri;
  const isCustom = el.id.startsWith('custom-');
  const screenName = SCREENS.find(s => s.id === el.screen)?.name || el.screen;

  panel.innerHTML = `
    <div class="prop-group">
      <label>元素: <strong>${el.name}</strong></label>
      <label style="color:#666;font-size:10px;margin-top:2px">${screenName} ${el.g ? '> ' + el.g : ''}</label>
      <label style="color:#555;font-size:10px;margin-top:1px">CSS: ${el.cssTarget}</label>
      ${isCustom ? `<div style="margin-top:4px"><label>自定义名称</label><input type="text" value="${el.name}" onchange="renameCustom('${el.id}',this.value)"></div>
      <div style="margin-top:4px"><label>CSS选择器</label><input type="text" value="${el.cssTarget}" onchange="updateCustomCSS('${el.id}',this.value)"></div>` : ''}
    </div>
    <div class="prop-group">
      <label>图片</label>
      <div class="upload-btn ${hasImg ? 'has-img' : ''}" onclick="triggerUpload('${el.id}')">
        ${hasImg ? '✓ 已上传（点击更换）' : '点击上传图片'}
      </div>
      ${hasImg ? `<img class="preview-thumb" src="${cfg.dataUri}"><button id="btn-remove-img" onclick="removeImage('${el.id}')">移除图片</button>` : ''}
    </div>
    <div class="prop-row">
      <div class="prop-group"><label>X</label><input type="number" value="${x}" onchange="updateProp('${el.id}','x',+this.value)"></div>
      <div class="prop-group"><label>Y</label><input type="number" value="${y}" onchange="updateProp('${el.id}','y',+this.value)"></div>
    </div>
    <div class="prop-row">
      <div class="prop-group"><label>宽度</label><input type="number" value="${w}" onchange="updateProp('${el.id}','w',+this.value)"></div>
      <div class="prop-group"><label>高度</label><input type="number" value="${h}" onchange="updateProp('${el.id}','h',+this.value)"></div>
    </div>
    <div class="prop-group">
      <label>填充方式</label>
      <select onchange="updateProp('${el.id}','fit',this.value)">
        <option value="fill" ${fit==='fill'?'selected':''}>拉伸填充 (fill)</option>
        <option value="contain" ${fit==='contain'?'selected':''}>等比包含 (contain)</option>
        <option value="cover" ${fit==='cover'?'selected':''}>等比覆盖 (cover)</option>
      </select>
    </div>
    <div class="prop-group">
      <label>层级 (z-index)</label>
      <div class="zindex-row">
        <input type="number" value="${z}" placeholder="auto" onchange="updateProp('${el.id}','z',this.value?+this.value:'')">
        <span>越大越前</span>
      </div>
    </div>
  `;
}

function updateProp(elId, prop, value) {
  if (!config[elId]) config[elId] = {};
  if (value === '' || value === undefined) delete config[elId][prop];
  else config[elId][prop] = value;
  renderPreview();
  saveConfig();
}

function triggerUpload(elId) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (!config[elId]) config[elId] = {};
      config[elId].dataUri = ev.target.result;
      renderSidebar(); renderPreview(); updateProps(); saveConfig();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removeImage(elId) {
  if (config[elId]) {
    delete config[elId].dataUri;
    if (Object.keys(config[elId]).length === 0) delete config[elId];
  }
  renderSidebar(); renderPreview(); updateProps(); saveConfig();
}

function addCustomElement() {
  const id = 'custom-' + customIdCounter++;
  const el = {
    id, screen: currentScreen, g:'自定义元素',
    name: '自定义元素 ' + customIdCounter,
    cssTarget: '.my-custom-class', prop: 'background',
    x: 100, y: 300, w: 120, h: 60, fit: 'fill'
  };
  customElements.push(el);
  saveCustom();
  renderSidebar(); renderPreview();
  selectElement(id);
}

function deleteCustom(elId) {
  customElements = customElements.filter(e => e.id !== elId);
  delete config[elId];
  if (selectedId === elId) selectedId = null;
  saveCustom(); saveConfig();
  renderSidebar(); renderPreview(); updateProps();
  showToast('已删除自定义元素');
}

function renameCustom(elId, name) {
  const el = customElements.find(e => e.id === elId);
  if (el) { el.name = name; saveCustom(); renderSidebar(); renderPreview(); }
}

function updateCustomCSS(elId, css) {
  const el = customElements.find(e => e.id === elId);
  if (el) { el.cssTarget = css; saveCustom(); }
}

function saveConfig() {
  try { localStorage.setItem('ui_editor_config_v3', JSON.stringify(config)); } catch(e) {}
}
function saveCustom() {
  try { localStorage.setItem('ui_editor_custom_v3', JSON.stringify(customElements)); } catch(e) {}
}
function saveToServer() {
  const payload = JSON.stringify({config: config, customElements: customElements});
  return fetch('/save-editor-state', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: payload
  }).then(r => r.ok).catch(() => false);
}
function loadFromServer() {
  return fetch('/load-editor-state').then(r => {
    if (!r.ok) return null;
    return r.json();
  }).catch(() => null);
}

function resetAll() {
  config = {}; customElements = []; customIdCounter = 1; selectedId = null;
  localStorage.removeItem('ui_editor_config_v3');
  localStorage.removeItem('ui_editor_custom_v3');
  saveToServer();
  renderSidebar(); renderPreview(); updateProps();
  showToast('已重置全部配置');
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function manualSave() {
  saveConfig();
  saveCustom();
  saveToServer().then(ok => {
    showToast(ok ? '配置已保存' : '保存到浏览器（服务端保存失败）');
  });
}

function buildExportData(screenFilter) {
  const exportData = {version: 3, screens: {}, elements: {}, customElements: []};
  const allEls = getAllElementsGlobal();

  for (const [id, cfg] of Object.entries(config)) {
    if (!cfg.dataUri) continue;
    const el = allEls.find(e => e.id === id);
    if (!el) continue;
    if (screenFilter && el.screen !== screenFilter) continue;
    const screenName = SCREENS.find(s => s.id === el.screen)?.name || el.screen;
    if (!exportData.screens[el.screen]) exportData.screens[el.screen] = {name: screenName, elements: []};
    exportData.screens[el.screen].elements.push(id);
    exportData.elements[id] = {
      name: el.name, screen: el.screen, screenName, group: el.g || '',
      cssTarget: el.cssTarget, prop: el.prop, dataUri: cfg.dataUri,
      x: cfg.x ?? el.x, y: cfg.y ?? el.y, w: cfg.w ?? el.w, h: cfg.h ?? el.h,
      fit: cfg.fit || el.fit || 'fill', z: cfg.z || el.z || ''
    };
  }

  const relevantCustom = screenFilter
    ? customElements.filter(e => e.screen === screenFilter)
    : customElements;
  if (relevantCustom.length > 0) exportData.customElements = relevantCustom;

  return exportData;
}

function doExport(exportData, filename) {
  const count = Object.keys(exportData.elements).length;
  const screenCount = Object.keys(exportData.screens).length;
  if (count === 0) {
    showToast('没有需要导出的配置');
    return;
  }
  try {
    const json = JSON.stringify(exportData, null, 2);
    // 1) Browser download
    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    // 2) Save to server output directory
    fetch('/save-export', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({filename: filename, data: json})
    }).then(r => {
      if (r.ok) showToast('已导出 ' + screenCount + ' 个界面 ' + count + ' 个元素（已保存到服务端）');
      else showToast('已导出 ' + screenCount + ' 个界面 ' + count + ' 个元素（服务端保存失败）');
    }).catch(() => {
      showToast('已导出 ' + screenCount + ' 个界面 ' + count + ' 个元素');
    });
  } catch(err) {
    showToast('导出失败: ' + err.message);
  }
}

function exportAll() {
  const data = buildExportData(null);
  doExport(data, 'ui-config-all.json');
}

function exportCurrentScreen() {
  const screen = SCREENS.find(s => s.id === currentScreen);
  const data = buildExportData(currentScreen);
  const name = screen ? screen.name : currentScreen;
  doExport(data, 'ui-config-' + currentScreen + '.json');
}

function importConfig() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.elements) {
          for (const [id, el] of Object.entries(data.elements)) {
            config[id] = {dataUri: el.dataUri, x: el.x, y: el.y, w: el.w, h: el.h, fit: el.fit};
            if (el.z) config[id].z = el.z;
          }
        }
        if (data.customElements && data.customElements.length) {
          data.customElements.forEach(ce => {
            if (!customElements.find(e => e.id === ce.id)) {
              customElements.push(ce);
              const n = parseInt(ce.id.replace('custom-',''));
              if (n >= customIdCounter) customIdCounter = n + 1;
            }
          });
          saveCustom();
        }
        saveConfig();
        renderSidebar(); renderPreview(); updateProps();
        showToast('配置导入成功');
      } catch(err) { showToast('导入失败：' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

init();
</script>
</body>
